<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#1B0845"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e0ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Antenna stem -->
  <rect x="30" y="6" width="4" height="10" rx="2" fill="#A78BFA"/>
  <!-- Antenna ball -->
  <circle cx="32" cy="5" r="4" fill="#C4B5FD"/>
  <!-- Antenna ball inner glow -->
  <circle cx="32" cy="5" r="2.5" fill="#EDE9FE"/>

  <!-- Robot head body -->
  <rect x="10" y="16" width="44" height="34" rx="9" fill="url(#head)"/>

  <!-- Head inner shadow / depth -->
  <rect x="11" y="17" width="42" height="32" rx="8" fill="none" stroke="#D8D0F8" stroke-width="1"/>

  <!-- Ear left -->
  <rect x="5" y="24" width="6" height="10" rx="3" fill="#C4B5FD"/>
  <!-- Ear right -->
  <rect x="53" y="24" width="6" height="10" rx="3" fill="#C4B5FD"/>

  <!-- Playwright eye left — green (WebKit) -->
  <circle cx="22" cy="32" r="7" fill="#2EAD33"/>
  <circle cx="22" cy="32" r="4.5" fill="#1A8C20"/>
  <circle cx="20" cy="29.5" r="2" fill="white" opacity="0.35"/>

  <!-- Playwright eye right — orange (Firefox) -->
  <circle cx="42" cy="32" r="7" fill="#E65229"/>
  <circle cx="42" cy="32" r="4.5" fill="#C43D14"/>
  <circle cx="40" cy="29.5" r="2" fill="white" opacity="0.35"/>

  <!-- Playwright "P" badge between eyes -->
  <rect x="30" y="29" width="4" height="6" rx="1" fill="#7C3AED" opacity="0.5"/>

  <!-- Mouth / speaker grill -->
  <rect x="20" y="44" width="24" height="3" rx="1.5" fill="#A78BFA" opacity="0.5"/>
  <rect x="23" y="44" width="2" height="3" rx="1" fill="#7C3AED" opacity="0.4"/>
  <rect x="27" y="44" width="2" height="3" rx="1" fill="#7C3AED" opacity="0.4"/>
  <rect x="31" y="44" width="2" height="3" rx="1" fill="#7C3AED" opacity="0.4"/>
  <rect x="35" y="44" width="2" height="3" rx="1" fill="#7C3AED" opacity="0.4"/>
  <rect x="39" y="44" width="2" height="3" rx="1" fill="#7C3AED" opacity="0.4"/>
</svg>
